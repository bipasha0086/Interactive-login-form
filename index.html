<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Form Validation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1>Registration Form</h1>
            <p class="subtitle">Please fill out all required fields</p>
            
            <form id="registrationForm" novalidate>
                <!-- Name Field -->
                <div class="form-group">
                    <label for="name">
                        👤 Full Name <span class="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="Enter your full name"
                        class="form-input"
                    >
                    <span class="error-message" id="nameError"></span>
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <label for="email">
                        📧 Email Address <span class="required">*</span>
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="example@email.com"
                        class="form-input"
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <!-- Phone Number Field -->
                <div class="form-group">
                    <label for="phone">
                        📱 Phone Number <span class="required">*</span>
                    </label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="(123) 456-7890"
                        class="form-input"
                    >
                    <span class="error-message" id="phoneError"></span>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">
                        🔒 Password <span class="required">*</span>
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter a strong password"
                        class="form-input"
                    >
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar"></div>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                    <div class="password-requirements">
                        <p class="requirements-title">Password must contain:</p>
                        <ul id="passwordRequirements">
                            <li id="req-length">At least 8 characters</li>
                            <li id="req-uppercase">One uppercase letter</li>
                            <li id="req-lowercase">One lowercase letter</li>
                            <li id="req-number">One number</li>
                            <li id="req-special">One special character</li>
                        </ul>
                    </div>
                </div>

                <!-- Confirm Password Field -->
                <div class="form-group">
                    <label for="confirmPassword">
                        🔐 Confirm Password <span class="required">*</span>
                    </label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Re-enter your password"
                        class="form-input"
                    >
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn">
                    ✨ Submit Form
                </button>
            </form>

            <!-- Success Message -->
            <div class="success-message" id="successMessage">
                <div class="success-content">
                    <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <h2>Form Submitted Successfully!</h2>
                    <p>Thank you for registering. Your information has been received.</p>
                    <button class="reset-btn" id="resetBtn">Submit Another Form</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
